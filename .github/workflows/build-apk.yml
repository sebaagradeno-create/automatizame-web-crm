name: Build Cocodrilo APK

on:
  push:
    paths:
      - 'proyectos/App_Cocodrilo/**'
      - '.github/workflows/build-apk.yml'
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repo
        uses: actions/checkout@v4

      - name: 🔧 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: ☕ Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Instalar dependencias
        working-directory: proyectos/App_Cocodrilo/cocodrilo
        run: npm install --legacy-peer-deps || (cat ~/.npm/_logs/*-debug.log && exit 1)

      - name: 🔄 Capacitor sync
        working-directory: proyectos/App_Cocodrilo/cocodrilo
        run: npx cap sync

      - name: 🔨 Build APK (debug)
        working-directory: proyectos/App_Cocodrilo/cocodrilo/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: proyectos/App_Cocodrilo/cocodrilo/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📤 Upload APK to Bridge
        working-directory: proyectos/App_Cocodrilo/cocodrilo/android/app/build/outputs/apk/debug
        run: |
          curl -k -X POST -F "data=@app-debug.apk" https://n8n.automatizameuy.com/webhook/subir-archivo-aria

      - name: 📱 Mensaje de éxito
        run: echo "✅ APK compilado y enviado a Bridge (Google Drive)"
